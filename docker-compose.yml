services:
  icloud-hme:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icloud-hme-app
    restart: unless-stopped
    command: ["python", "web_ui.py", "--host", "0.0.0.0", "--port", "5050"]
    working_dir: /app
    volumes:
      - /root/docker/icloud-hme:/app
    networks:
      - caddy_default

networks:
  caddy_default:
    external: true
